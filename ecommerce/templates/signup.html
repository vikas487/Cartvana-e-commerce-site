{% extends 'base.html' %}
{% block title %}Sign Up{% endblock title %}
{% block body %}
<div class="container mt-5 mb-5">
    <div class="row align-items-center justify-content-center">
        <div class="col-md-6 p-4 border rounded shadow-sm bg-light">
            <h3 class="text-center mb-4">Create an Account</h3>

            {% for message in messages %}
            <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
                <strong>Message:</strong> {{message}}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            {% endfor %}

            <form action="/signup/" method="POST">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="Enter Username (max 10 characters)" required>
                </div>
                <div class="form-group mb-3">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter Email" required>
                </div>
                <div class="form-group mb-3">
                    <label for="pass1">Password</label>
                    <input type="password" class="form-control" id="pass1" name="pass1" placeholder="Enter Password"
                        required>
                </div>
                <div class="form-group mb-4">
                    <label for="pass2">Confirm Password</label>
                    <input type="password" class="form-control" id="pass2" name="pass2" placeholder="Confirm Password"
                        required>
                </div>
                <button type="submit" class="btn btn-success btn-block w-100 mt-2">Sign Up</button>
            </form>
            <p class="text-center mt-3">Already have an account? <a href="/login/">Login here</a></p>
        </div>
    </div>
</div>
{% endblock body %}
